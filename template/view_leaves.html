<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="">
        <tr>
            <th>User name</th>
            <th>leave type</th>
            <th>start date</th>
            <th>end date</th>
            <th>reason</th>
            <th>status</th>
            <th>Action</th>
        </tr>
        {% for i in leaves %}

        <tr>
            <td>{{i.user.username}}</td>
            <td>{{i.leave_type}}</td>
            <td>{{i.start_date}}</td>
            <td>{{i.end_date}}</td>
            <td>{{i.reason}}</td>
            <td>{{i.status}}</td>
            <td>
                {% if i.status == 'Pending' %}
                <a href="{% url 'approve_leave' i.id %}">Approve</a>
                <a href="{% url 'reject_leave' i.id %}">Reject</a>
                {% endif %}
            </td>
            {% empty %}
            <tr>
                <td>
                    No leaves request found
                </td>
            </tr>
            
        </tr>
        {% endfor %}
    </table>
    <a href="{% url 'admin_dahsboard' %}">Back to Admin </a>
</body>
</html>
