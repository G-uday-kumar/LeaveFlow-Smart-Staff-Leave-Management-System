<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="">
        <tr>
            <th>Leave Type</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Reason</th>
            <th>Status</th>
        </tr>
        {% for i in leaves %}
        <tr>
            <td>{{i.leave_type}}</td>
            <td>{{i.start_date}}</td>
            <td>{{i.end_date}}</td>
            <td>{{i.reason}}</td>
            <td>{{i.status}}</td>
        </tr>
        {% empty %}
        <tr>
            <td>No Leaves application found</td>
        </tr>
        {% endfor %}


    </table>
    <a href="{% url 'staff_dashboard' %}">back to staff dashboard</a>
</body>
</html>
